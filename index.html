<!-- Classe que determina a Altura-->

<label for="altMM">Altura (mm)</label>

type="number" 
id="altMM"

class="form_input"
required>

<!-- Classe que determina a Largura-->

type="number" 
id="largMM" 
step="1" 
class="form_input" 
required>
</div>
