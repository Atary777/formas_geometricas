<!doctype html>
<html lang="pt-br">
  <!--Título que aparece na aba do navegador, (Title) deve ser em letra minúscula-->
  <title>Formas geométricas</title>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" constant="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <texto>Vamos calcular a área da figura:</texto>

    <div class="select_group">
      <!--Classe que seleciona a forma-->
      <select id="forms" class="form_input" required>
        <option value="">Selecione a forma:</option>
        <option value="0" onselect="triangular()">Triângulo</option>
        <option value="1" onselect="quadrangular()">Quadrado</option>
        <option value="2" onselect="circular()">Círculo</option>
        <option value="3" onselect="trapezional()">Trapézio</option>
        <option value="4" onselect="retangular()">Retângulo</option>
      </select>
    </div>

    <div class="input_group">
      <!-- Classe que determina a Altura-->
      <label for="altura">Altura do quadrado:</label>
      <input type="number" id="altura" step="1" class="form_input" required />
    </div>

    <div class="input_group">
      <!-- Classe que determina a Largura-->
      <label for="largura">Largura do quadrado:</label>
      <input type="number" id="largura" step="1" class="form_input" required />
    </div>

    <button type="button" onclick="mostrarMensagem()">
      Calcular resultados:
    </button>

    <div>
      <result id="resultado"></result>
    </div>

    <div>
      <result id="resultado"></result>
    </div>
    <script src="script.js"></script>
  </body>
</html>
