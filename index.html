<html lang="pt-br">
    <Title>Formas geométricas</Title>

<body>
<!-- Classe Altura-->
<div class="input_group">
<label for="altMM">Altura (mm)</label>
<input type="number" 
    id="altMM" 
    step="1" 
    placeholder="Ex: 1200" 
    required>
</div>
<!-- Classe Largura-->
<div class="input_group">
<label for="largMM">Largura (mm)</label>
<input type="number" 
    id="largMM" 
    step="1" 
    placeholder="Ex: 1200" 
    required>
</div>

<button type="button" onclick="mostrarMensagem()">
    Calcular resultados:
</button> 
<div>
<result id="resultado">

</result>
</div>

</body>
