<!DOCTYPE html>
<html lang="pt-br">
<!--Título que aparece na aba do navegador, (Title) deve ser em letra minúscula-->
<title>Formas geométricas</title>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" constant="width=device-width, initial-scale=1.0">
    <!--  -->
</head>

<body>
    <texto>Vamos calcular a área da figura:</texto>

    <div class="select_group"> <!--Classe que seleciona Espessura-->
        <select id="espMM" class="form_input" required>
            <option value="">Selecione a espessura:</option>
            <option value="6">espessura 06 mm</option>
            <option value="15">espessura 15 mm</option>
            <option value="18">espessura 18 mm</option>
            <option value="25">espessura 25 mm</option>
        </select>
    </div>

    <div class="input_group"> <!-- Classe que determina a Altura-->
        <label for="altMM">Altura (mm)</label>
        <input type="number" id="altMM" step="1" class="form_input" required>
    </div>

    <div class="input_group"> <!-- Classe que determina a Largura-->
        <label for="largMM">Largura (mm)</label>
        <input type="number" id="largMM" step="1" class="form_input" required>
    </div>

    <button type="button" onclick="mostrarMensagem()">Calcular resultados:</button>

    <div>
        <result id="resultado"></result>
    </div>

    <script src="script.js"></script>

</body>

</html>
